---
services:
  index:
    image: elasticsearch:7.17.3
    container_name: index
    environment:
      - cluster.name=docker-cluster
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports: [9200:9200, 9300:9300]
    volumes: [esdata:/usr/share/elasticsearch/data]
    healthcheck:
      test: [CMD-SHELL, curl -s http://localhost:9200 >/dev/null || exit 1]
      interval: 1m
      timeout: 20s
      retries: 5
      start_period: 1m
  queue:
    image: redis:6.0
    container_name: queue
    ports: [6379:6379]
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 5s
      retries: 3
  database:
    image: postgres:14
    container_name: database
    environment: [POSTGRES_USER=postgres, POSTGRES_HOST_AUTH_METHOD=trust]
    env_file: [.env]
    ports: [5432:5432]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD, pg_isready, -U, postgres]
      interval: 1m
      timeout: 30s
      retries: 5
      start_period: 1m
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - OTEL_SERVICE_NAME=django-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=console,otlp
      - OTEL_EXPORTER_OTLP_INSECURE=true
    container_name: api
    deploy:
      resources:
        reservations:
          cpus: '0.5'
          memory: 2G
        limits:
          cpus: '1.0'
          memory: 4G
    env_file: [.env]
    command: [poetry, run, /app/start-server-dev.sh]
    ports:
      - 8080:80  # API port
      - 5678:5678  # Debug port
    volumes: [.:/app, $HOME/.basedosdados/credentials:/app/credentials:ro]
    networks: [default, api_network]
    depends_on:
      index:
        condition: service_healthy
      queue:
        condition: service_healthy
      database:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started
    healthcheck:
      test: [CMD, curl, -f, http://localhost:8000/healthcheck/]
      interval: 1m
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: unless-stopped
  otel-collector:
    image: otel/opentelemetry-collector
    container_name: otel-collector
    command: ["--config=/otel_collector/otel-config.yaml"]
    volumes:
      - ./otel_collector/otel-collector-config.yaml:/otel_collector/otel-config.yaml
    ports:
      - "4317:4317"  # OTLP gRPC receiver
      - "4318:4318"  # OTLP HTTP receiver      - ./otel_collector/otel-collector-config.yaml:/otel_collector/otel-config.yaml
    networks: [default, api_network]
    restart: unless-stopped
  jaeger:
    image: jaegertracing/all-in-one
    container_name: jaeger
    ports:
      - "16686:16686"  # UI
      - "14250:14250"  # gRPC
      - "14268:14268"  # HTTP
      - "9411:9411"  # Zipkin
    restart: unless-stopped
    networks: [default, api_network]
volumes:
  esdata:
  pgdata:
# External network used for api access by other services (e.g., chatbot API)
networks:
  api_network:
    name: api_network
